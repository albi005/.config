# https://github.com/mrnossiom/wakatime-ls#helix
[language-server.wakatime]
command = "wakatime-ls"

[language-server.helm-ls]
command = "helm_ls"

[language-server.yaml-language-server.config.yaml]
schemas = { "https://json.schemastore.org/kustomization" = "kustomization.yaml" }

# Add an entry for every used language to enable coding-time tracking
# https://github.com/helix-editor/helix/blob/master/languages.toml#L293
[[language]]
name = "markdown"
language-servers = [ "marksman", "wakatime" ]
[[language]]
name = "yaml"
language-servers = [ "yaml-language-server", "helm-ls", "wakatime" ]
[[language]]
name = "rust"
language-servers = [ "rust-analyzer", "wakatime" ]
[[language]]
name = "nix"
language-servers = [ "nixd", "nil", "wakatime" ]
[[language]]
name = "prolog"
file-types = ["pl", "pro", "prolog"]
language-servers = [ "swipl", "wakatime" ]
[[language]]
name = "elixir"
language-servers = [ "elixir-ls", "expert", "wakatime" ]
[[language]]
name = "javascript"
language-servers = [ "typescript-language-server", "wakatime" ]
[[language]]
name = "typescript"
language-servers = [ "typescript-language-server", "wakatime" ]
[[language]]
name = "jsx"
language-servers = [ "typescript-language-server", "wakatime" ]
[[language]]
name = "tsx"
language-servers = [ "typescript-language-server", "wakatime" ]
[[language]]
name = "css"
language-servers = [ "vscode-css-language-server", "wakatime" ]
[[language]]
name = "python"
language-servers = [ "ty", "ruff", "jedi", "pylsp", "wakatime" ]
[[language]]
name = "html"
language-servers = [ "vscode-html-language-server", "superhtml", "wakatime" ]
[[language]]
name = "vhdl"
language-servers = [ "vhdl_ls", "wakatime" ]
[[language]]
name = "lua"
language-servers = [ "lua-language-server", "wakatime" ]

# Fix .pl being perl instead of prolog
# https://github.com/jamesnvc/lsp_server#helix
[[language]]
name = "perl"
file-types = ["perl"]

# https://www.kcl-lang.io/docs/next/tools/Ide/helix
[[language]]
name = "kcl"
scope = "source.k"
file-types = ["kcl", { glob = "*.k" } ]
roots = ["kcl.mod", "kcl.yaml"]
language-servers = ["kcl-lsp"]

[language-server.kcl-lsp]
command = "kcl-language-server"
